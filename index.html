<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cris IA - Painel CEABS</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <div class="logo">CEABS <span style="color:var(--secondary)">CRIS IA</span></div>
        
        <button class="btn-mic" id="btnAction">🎤</button>
        <div id="status">Clique para iniciar voz</div>
        
        <div class="chat-container">
            <div class="label">Conversa em tempo real</div>
            <div id="chat-window" class="chat-window">
                <div class="message system">Olá! Como posso ajudar você hoje?</div>
            </div>
        </div>

        <div class="input-group">
            <input type="text" id="chatInput" placeholder="Ou digite sua mensagem aqui...">
            <button id="btnSendChat">Enviar</button>
        </div>
    </div>

    <script src="js/audio-utils.js"></script>
    <script src="js/transcribe.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
