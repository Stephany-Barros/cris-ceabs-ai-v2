<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cris IA - Painel CEABS</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <div class="logo">CEABS <span style="color:var(--secondary)">CRIS IA</span></div>
        
        <button class="btn-mic" id="btnAction">🎤</button>
        <div id="status">Clique para iniciar voz</div>
        
        <div class="chat-box">
            <div class="label">Interação atual:</div>
            <div class="text-output">
                <strong>Você:</strong> <span id="userText">---</span>
            </div>
            <div class="text-output">
                <strong>Cris:</strong> <span id="crisText">---</span>
            </div>
        </div>

        <div class="input-group" style="margin-top: 20px; display: flex; gap: 10px;">
            <input type="text" id="chatInput" placeholder="Ou digite aqui sua dúvida..." 
                   style="flex-grow: 1; padding: 12px; border-radius: 5px; border: 1px solid var(--secondary); background: rgba(255,255,255,0.05); color: white;">
            <button id="btnSendChat" style="padding: 10px 20px; cursor: pointer; background: var(--secondary); color: white; border: none; border-radius: 5px; font-weight: bold;">
                Enviar
            </button>
        </div>
    </div>

    <script src="js/audio-utils.js"></script>
    <script src="js/transcribe.js"></script>
    <script src="js/chat.js"></script> <script src="js/app.js"></script>   </body>
</html>
